<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="rgba(247,245,240,0.06)" stroke-width="1"/>
    </pattern>
    <linearGradient id="fade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0E1015"/>
      <stop offset="1" stop-color="#15181F"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#fade)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Top brand mark -->
  <g transform="translate(80,90)">
    <rect x="0" y="0" width="52" height="52" fill="none" stroke="#E8A33D" stroke-width="2"/>
    <text x="26" y="35" font-family="'Space Mono', monospace" font-size="18" font-weight="700" fill="#E8A33D" text-anchor="middle">TBN</text>
    <text x="72" y="24" font-family="'Space Mono', monospace" font-size="16" font-weight="700" fill="#F7F5F0">THE BINARY BRAIN NETWORK</text>
    <text x="72" y="46" font-family="'Space Mono', monospace" font-size="13" fill="#8A92A0">A TBBN DIVISION · SYSTEMS</text>
  </g>

  <!-- Live status pill -->
  <g transform="translate(80,200)">
    <rect x="0" y="0" width="240" height="34" fill="rgba(61,122,92,0.18)"/>
    <circle cx="20" cy="17" r="5" fill="#3D7A5C"/>
    <circle cx="20" cy="17" r="10" fill="none" stroke="rgba(61,122,92,0.35)" stroke-width="4"/>
    <text x="40" y="22" font-family="'Space Mono', monospace" font-size="12" font-weight="700" fill="#6FCB9A" letter-spacing="2">01 SYSTEM LIVE · 06 IN ROSTER</text>
  </g>

  <!-- Headline -->
  <text x="80" y="330" font-family="Inter, sans-serif" font-size="66" font-weight="800" fill="#F7F5F0" letter-spacing="-1.5">Software for the operations</text>
  <text x="80" y="405" font-family="Inter, sans-serif" font-size="66" font-weight="800" fill="#F7F5F0" letter-spacing="-1.5">that still run on <tspan fill="#E8A33D" font-style="italic">paper.</tspan></text>

  <!-- Sub -->
  <text x="80" y="475" font-family="Inter, sans-serif" font-size="22" fill="#8A92A0">Focused, single-purpose software for hospitality</text>
  <text x="80" y="505" font-family="Inter, sans-serif" font-size="22" fill="#8A92A0">and service businesses in India.</text>

  <!-- Footer -->
  <line x1="80" y1="555" x2="1120" y2="555" stroke="rgba(247,245,240,0.1)" stroke-width="1"/>
  <text x="80" y="590" font-family="'Space Mono', monospace" font-size="14" fill="#5A6270" letter-spacing="2">TBN.TBBN.IN</text>
  <text x="1120" y="590" font-family="'Space Mono', monospace" font-size="14" fill="#5A6270" letter-spacing="2" text-anchor="end">FOLIO · LIVE · MORE SHIPPING</text>
</svg>
