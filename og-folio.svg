<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="rgba(247,245,240,0.06)" stroke-width="1"/>
    </pattern>
    <linearGradient id="fade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0E1015"/>
      <stop offset="1" stop-color="#15181F"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#fade)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Left: content -->
  <g transform="translate(80,90)">
    <rect x="0" y="0" width="52" height="52" fill="none" stroke="#E8A33D" stroke-width="2"/>
    <text x="26" y="35" font-family="'Space Mono', monospace" font-size="18" font-weight="700" fill="#E8A33D" text-anchor="middle">TBN</text>
    <text x="72" y="24" font-family="'Space Mono', monospace" font-size="15" font-weight="700" fill="#F7F5F0">THE BINARY BRAIN NETWORK</text>
    <text x="72" y="46" font-family="'Space Mono', monospace" font-size="12" fill="#8A92A0">/ FOLIO</text>
  </g>

  <g transform="translate(80,200)">
    <rect x="0" y="0" width="260" height="34" fill="rgba(61,122,92,0.18)"/>
    <circle cx="20" cy="17" r="5" fill="#3D7A5C"/>
    <circle cx="20" cy="17" r="10" fill="none" stroke="rgba(61,122,92,0.35)" stroke-width="4"/>
    <text x="40" y="22" font-family="'Space Mono', monospace" font-size="12" font-weight="700" fill="#6FCB9A" letter-spacing="2">LIVE · MUMBAI · 1 MONTH+</text>
  </g>

  <text x="80" y="325" font-family="Inter, sans-serif" font-size="70" font-weight="800" fill="#F7F5F0" letter-spacing="-1.8">The room-service layer</text>
  <text x="80" y="400" font-family="Inter, sans-serif" font-size="70" font-weight="800" fill="#F7F5F0" letter-spacing="-1.8">your hotel software <tspan fill="#E8A33D" font-style="italic">forgot.</tspan></text>

  <text x="80" y="470" font-family="Inter, sans-serif" font-size="22" fill="#8A92A0">Offline-first billing, dues &amp; reporting.</text>
  <text x="80" y="500" font-family="Inter, sans-serif" font-size="22" fill="#8A92A0">7-day free trial · Free setup &amp; training.</text>

  <!-- Right: receipt-like decorative panel -->
  <g transform="translate(830,150) rotate(2)">
    <rect x="0" y="0" width="260" height="360" fill="#F7F5F0"/>
    <rect x="10" y="10" width="240" height="340" fill="none" stroke="rgba(14,16,21,0.2)" stroke-width="1" stroke-dasharray="3,3"/>
    <text x="130" y="46" font-family="'Space Mono', monospace" font-size="13" font-weight="700" fill="#0E1015" text-anchor="middle">FOLIO · BILL #0142</text>
    <line x1="30" y1="60" x2="230" y2="60" stroke="rgba(14,16,21,0.25)" stroke-dasharray="2,2"/>
    <g font-family="'Space Mono', monospace" font-size="11" fill="#0E1015">
      <text x="30" y="88">Veg Pulao ×2</text><text x="230" y="88" text-anchor="end">₹360</text>
      <text x="30" y="112">Butter Naan ×4</text><text x="230" y="112" text-anchor="end">₹240</text>
      <text x="30" y="136">Cold Coffee ×2</text><text x="230" y="136" text-anchor="end">₹180</text>
      <text x="30" y="160">Club Sandwich ×1</text><text x="230" y="160" text-anchor="end">₹220</text>
    </g>
    <line x1="30" y1="180" x2="230" y2="180" stroke="rgba(14,16,21,0.25)" stroke-dasharray="2,2"/>
    <g font-family="'Space Mono', monospace" font-size="11" fill="#5A6270">
      <text x="30" y="204">Subtotal</text><text x="230" y="204" text-anchor="end">₹1,000</text>
      <text x="30" y="226">CGST + SGST</text><text x="230" y="226" text-anchor="end">₹50</text>
    </g>
    <line x1="30" y1="248" x2="230" y2="248" stroke="rgba(14,16,21,0.4)"/>
    <text x="30" y="278" font-family="'Space Mono', monospace" font-size="15" font-weight="700" fill="#0E1015">TOTAL</text>
    <text x="230" y="278" font-family="'Space Mono', monospace" font-size="15" font-weight="700" fill="#0E1015" text-anchor="end">₹1,050</text>
    <text x="130" y="320" font-family="'Space Mono', monospace" font-size="9" fill="#5A6270" text-anchor="middle">Thank you for your stay!</text>
    <rect x="180" y="-14" width="94" height="24" fill="#E8A33D"/>
    <text x="227" y="2" font-family="'Space Mono', monospace" font-size="11" font-weight="700" fill="#0E1015" text-anchor="middle">LIVE PREVIEW</text>
  </g>

  <line x1="80" y1="555" x2="1120" y2="555" stroke="rgba(247,245,240,0.1)" stroke-width="1"/>
  <text x="80" y="590" font-family="'Space Mono', monospace" font-size="14" fill="#5A6270" letter-spacing="2">TBN.TBBN.IN/FOLIO</text>
  <text x="1120" y="590" font-family="'Space Mono', monospace" font-size="14" fill="#5A6270" letter-spacing="2" text-anchor="end">WHATSAPP +91 99879 91072</text>
</svg>
